[toolchain]
anchor_version = "0.32.1"
solana_version = "3.1.2"
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.mainnet]
solana_vault = "8ssaGrsiVrJqaUzCEhTfVUj6K1ZpXcdwx9xD9gxZWWvC"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "mainnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""

[test]
startup_wait = 20000
shutdown_wait = 2000
upgradeable = false
